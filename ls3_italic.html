<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การใช้งาน tag &lt; i &gt; และ &lt; em &gt;</title>
</head>
<body>
    <h1>การใช้งาน tag &lt; i &gt; และ &lt; em &gt;</h1>
    <p>ฉัน <em>รัก</em> การเขียนโค้ดมากๆเลย</p>
    <p>คอมพิวเตอร์ทำงานด้วยระบบ <i>Binary Code</i> หรือเลขฐานสอง</p>
    <br>
    <h1>การใช้งาน tag &lt; u &gt; </h1>
    <h4><u>ตัวอย่างการใช้งาน</u> : </h4>
    <p>กรุณาอ่าน<u>เงื่อนไขการใช้งาน</u> ก่อนกดยอมรับ</p>
</body>
</html>
